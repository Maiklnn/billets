<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, shrink-to-fit=no">
    <meta name="description">
    <meta name="keywords" content="">
    <title>Блок1</title>
    <link rel="stylesheet" href="assets/css/main.css?v=undefined"><link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="products-main">
      <div class="products-main__grid-top">
        <div class="new-title">Бетон М 150 (В 12,5)</div>
        <div class="products-main__icon"><img src="assets/img/icon/!.png" alt="#"></div>
      </div>
      <div class="products-main__grid">
        <!-- картинка-->
        <div class="products-main-img"><img class="products-main-img__img" src="assets/img/product/product.jpg" alt="#">
          <div class="products-main-img__info">
            <div class="products-main-img__info-item">Для строительства</div>
            <div class="products-main-img__info-item">М-150</div>
          </div>
        </div>
        <div class="products-main-info">
          <!-- Характеристики-->
          <div class="products-main-specification">
            <div class="products-main-specification__title">Характеристики</div>
            <div class="products-main-specification__item">
              <div class="products-main-specification__descr">Длина, мм</div>
              <div class="products-main-specification__price">1810</div>
            </div>
            <div class="products-main-specification__item">
              <div class="products-main-specification__descr">Ширина, мм</div>
              <div class="products-main-specification__price">1810</div>
            </div>
            <div class="products-main-specification__item">
              <div class="products-main-specification__descr">Высота, мм</div>
              <div class="products-main-specification__price">1810</div>
            </div>
          </div>
          <!-- Цена-->
          <div class="products-main-price">
            <div class="products-main-price__name">Цена</div>
            <div class="products-main-price__num"><span>3100</span> руб</div>
          </div>
          <!-- stepper-->
          <div class="stepper-block">
            <div class="stepper">
              <button class="stepper__btn stepper__btn--down stepper__btn--disabled" aria-label="Уменьшить количество"></button>
              <label class="stepper__field">
                <input class="stepper__input" type="text" value="1" maxlength="3">
              </label>
              <button class="stepper__btn stepper__btn--up" aria-label="Увеличить количество"></button>
            </div>
            <div class="btn">В корзину</div>
          </div>
        </div>
      </div>
    </div>
    <script src="assets/js/main.js?v=undefined"></script>
  </body>
</html>
